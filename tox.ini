[tox]
env_list = lint, typecheck, py, docs, dependency-scan, smoke
min_version = 4.15

[testenv]
package = editable
extras = dev
commands = pytest

[testenv:lint]
package = skip
deps = ruff>=0.5.0
commands = ruff check .

[testenv:typecheck]
package = editable
extras = dev
commands = mypy

[testenv:docs]
package = skip
commands = python scripts/docs_check.py

[testenv:dependency-scan]
package = skip
commands = python scripts/dependency_security_check.py

[testenv:smoke]
package = editable
extras = dev
commands =
    signaldesk --help
    signaldesk health
    signaldesk providers list
    signaldesk providers check
    signaldesk-api openapi
    signaldesk web provider-status --mode default --output json
    signaldesk web watchlist-scan --watchlist watchlists/default.yaml --provider local-fixture --llm none --output json
    signaldesk ta AMD --provider local-fixture --llm none --output json
    signaldesk backtest setup AMD --setup-label breakout_watch --signal-index 10 --signal-index 20 --horizon 1 --horizon 5 --provider local-fixture --output json
    signaldesk llm prompt-payload AMD --provider local-fixture --output json
    signaldesk llm chat-messages AMD --provider local-fixture --output json
    signaldesk llm validate-output fixtures/llm/valid-explanation.json

[testenv:format]
package = skip
deps = ruff>=0.5.0
commands = ruff format .

[testenv:fix]
package = skip
deps = ruff>=0.5.0
commands = ruff check . --fix
