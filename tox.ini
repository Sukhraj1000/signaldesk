[tox]
env_list = lint, typecheck, py
min_version = 4.15

[testenv]
package = editable
extras = dev
commands = pytest

[testenv:lint]
package = skip
deps = ruff>=0.5.0
commands = ruff check .

[testenv:typecheck]
package = editable
extras = dev
commands = mypy

[testenv:format]
package = skip
deps = ruff>=0.5.0
commands = ruff format .

[testenv:fix]
package = skip
deps = ruff>=0.5.0
commands = ruff check . --fix
