[tox]
env_list = lint, typecheck, py, docs, smoke
min_version = 4.15

[testenv]
package = editable
extras = dev
commands = pytest

[testenv:lint]
package = skip
deps = ruff>=0.5.0
commands = ruff check .

[testenv:typecheck]
package = editable
extras = dev
commands = mypy

[testenv:docs]
package = skip
commands = python scripts/docs_check.py

[testenv:smoke]
package = editable
extras = dev
commands =
    signaldesk --help
    signaldesk health
    signaldesk providers list
    signaldesk providers check

[testenv:format]
package = skip
deps = ruff>=0.5.0
commands = ruff format .

[testenv:fix]
package = skip
deps = ruff>=0.5.0
commands = ruff check . --fix
